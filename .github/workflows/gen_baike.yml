name: Auto Gen baike.txt
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen_file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Run generate script
        run: python3 .github/scripts/gen_baike.py

      - name: Auto commit & push
        run: |
          git config --global user.name "WikiBot"
          git config --global user.email "bot@bgpwiki.dev"
          git add baike.txt
          if ! git diff --cached --quiet;then
            git commit -m "Auto update baike.txt"
            git push
          fi